<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Magic Circle</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#ccc;font-family:sans-serif;touch-action:manipulation}
#canvasWrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#000}
canvas{display:block;max-width:100vmin;max-height:100vmin}

/* top bar */
#topbar{position:fixed;top:0;left:0;right:0;height:44px;display:flex;align-items:center;gap:6px;padding:0 10px;background:rgba(0,0,0,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:100;border-bottom:1px solid #1a1a1a}
#styleSelect{flex:1;font-size:13px;background:#111;color:#ccc;border:1px solid #2a2a2a;border-radius:6px;padding:4px 6px;min-width:0}
.topbtn{flex-shrink:0;font-size:13px;padding:5px 10px;background:#111;color:#aaa;border:1px solid #2a2a2a;border-radius:6px;cursor:pointer;white-space:nowrap}
.topbtn.on{background:#222;color:#fff;border-color:#555}

/* FABs */
#fabs{position:fixed;right:10px;bottom:68px;display:flex;flex-direction:column;gap:8px;z-index:99}
.fab{width:44px;height:44px;border-radius:22px;background:rgba(15,15,15,0.92);border:1px solid #2a2a2a;color:#888;font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(4px)}
.fab.on{background:rgba(35,35,35,0.95);color:#ddd;border-color:#555}

/* bottom nav bar */
#bottomNav{position:fixed;bottom:0;left:0;right:0;height:52px;background:rgba(6,6,6,0.97);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid #1a1a1a;display:flex;z-index:100}
.navbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;color:#555;font-size:9px;text-transform:uppercase;letter-spacing:.5px;border:none;background:none;padding:4px 0}
.navbtn svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.navbtn.active{color:#ccc}
.navbtn.active svg{stroke:#ccc}

/* drawer */
#drawer{position:fixed;bottom:52px;left:0;right:0;background:rgba(8,8,8,0.98);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid #1e1e1e;z-index:99;transition:transform .28s cubic-bezier(.4,0,.2,1);transform:translateY(100%);max-height:65vh;display:flex;flex-direction:column}
#drawer.open{transform:translateY(0)}
#drawerHandle{height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.pill{width:32px;height:3px;background:#2a2a2a;border-radius:2px}
#drawerContent{overflow-y:auto;overflow-x:hidden;padding:0 14px 16px;flex:1}

/* section groups inside drawer */
.dsec{margin-bottom:14px}
.dsec-h{font-size:10px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.dsec-h span{color:#666;font-size:10px;cursor:pointer}

/* controls */
.srow{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.srow label{font-size:11px;color:#666;width:80px;flex-shrink:0}
.srow input[type=range]{flex:1;min-width:0}
.sv{font-size:11px;color:#aaa;width:32px;text-align:right;flex-shrink:0}
.crow{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #0d0d0d}
.crow label{font-size:12px;color:#777}
/* toggle */
.tog{position:relative;width:36px;height:20px;flex-shrink:0;cursor:pointer}
.tog input{opacity:0;width:0;height:0;position:absolute}
.knob{position:absolute;inset:0;background:#1e1e1e;border-radius:10px;transition:.2s}
.knob:before{content:'';position:absolute;height:14px;width:14px;left:3px;top:3px;background:#444;border-radius:50%;transition:.2s}
.tog input:checked+.knob{background:#252525}
.tog input:checked+.knob:before{transform:translateX(16px);background:#bbb}
/* colour grid */
.cgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;margin-bottom:8px}
.csw{width:100%;aspect-ratio:1;border-radius:3px;cursor:pointer;border:2px solid transparent}
.csw.sel{border-color:#fff}
/* symbol grid */
#mSymGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;max-height:130px;overflow-y:auto;margin-bottom:8px}
.msym{font-size:17px;text-align:center;padding:3px;cursor:pointer;border-radius:3px;border:1px solid transparent;line-height:1.4}
.msym.sel{background:#1a1a1a;border-color:#333}
/* preset grid */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.pbtn{font-size:11px;padding:7px 6px;background:#0e0e0e;color:#777;border:1px solid #1a1a1a;border-radius:5px;cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pbtn:active,.pbtn:hover{background:#161616;color:#ccc}
/* golden preset buttons */
.gbtn{font-size:11px;padding:6px;background:#0e0e0e;color:#777;border:1px solid #1a1a1a;border-radius:5px;cursor:pointer;text-align:center}
.gbtn:active{background:#161616;color:#ccc}
/* speed selects */
.speed-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid #0d0d0d}
.speed-row label{font-size:11px;color:#666}
.speed-sel{font-size:11px;background:#111;color:#ccc;border:1px solid #2a2a2a;border-radius:4px;padding:3px 5px}
/* export */
.egrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:8px}
.ebtn{padding:9px;font-size:12px;background:#0e0e0e;color:#888;border:1px solid #1a1a1a;border-radius:7px;cursor:pointer;text-align:center}
.ebtn:active{background:#161616}
select,input[type=text],input[type=color]{background:#111;color:#ccc;border:1px solid #2a2a2a;border-radius:5px}
input[type=text]{width:100%;padding:6px;font-size:12px;margin-bottom:6px}
input[type=color]{width:100%;height:30px;cursor:pointer;margin-bottom:8px}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:#0a0a0a}::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px}
</style>
</head>
<body>

<div id="canvasWrap"><canvas id="c"></canvas></div>

<!-- Top bar -->
<div id="topbar">
  <select id="styleSelect">
    <option value="star">Star polygon</option><option value="orbital">Orbital</option>
    <option value="alchemic">Alchemic</option><option value="pentagram">Pentagram</option>
    <option value="mandala">Mandala</option><option value="celtic">Celtic knot</option>
    <option value="sigil">Sigil</option><option value="rose">Rose window</option>
    <option value="enochian">Enochian</option><option value="sacred">Sacred geometry</option>
    <option value="compass">Compass rose</option><option value="labyrinth">Labyrinth</option>
    <option value="zodiac">Zodiac wheel</option><option value="fractal">Fractal rings</option>
    <option value="gothic">Gothic arch</option><option value="norse">Norse web</option>
    <option value="chaos">Chaos star</option>
  </select>
  <button class="topbtn" id="mAnimBtn">▶</button>
  <button class="topbtn" id="mRandBtn">🎲</button>
</div>

<!-- FABs -->
<div id="fabs">
  <div class="fab" id="fabPulse" title="Pulse">〇</div>
  <div class="fab" id="fabDual" title="Dual">⊕</div>
  <div class="fab" id="fabMirror" title="Mirror">⧉</div>
  <div class="fab" id="fabSparks" title="Sparks">✦</div>
</div>

<!-- Drawer -->
<div id="drawer">
  <div id="drawerHandle"><div class="pill"></div></div>
  <div id="drawerContent"></div>
</div>

<!-- Bottom nav -->
<div id="bottomNav">
  <button class="navbtn active" data-panel="adjust">
    <svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>Adjust
  </button>
  <button class="navbtn" data-panel="color">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3a9 9 0 0 1 0 18"/></svg>Color
  </button>
  <button class="navbtn" data-panel="detail">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 3v3m0 12v3M3 12h3m12 0h3"/></svg>Detail
  </button>
  <button class="navbtn" data-panel="sigil">
    <svg viewBox="0 0 24 24"><path d="M12 3l3 6 6 1-4.5 4 1 6L12 17l-5.5 3 1-6L3 10l6-1z"/></svg>Sigil
  </button>
  <button class="navbtn" data-panel="text">
    <svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h10M4 17h13"/></svg>Text
  </button>
  <button class="navbtn" data-panel="speeds">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>Speeds
  </button>
  <button class="navbtn" data-panel="export">
    <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export
  </button>
</div>

<script>
// ── Data ──
const SYM_SETS={
  alchemic:['🜀','🜁','🜂','🜃','🜄','🜅','🜆','🜇','🜈','🜉','🜊','🜋','🜌','🜍','🜎','🜏','🜐','🜑','🜒','🜓','🜔','🜕','🜖','🜗','🜘','🜙','🜚','🜛','🜜','🜝','🜞','🜟','🜠','🜡','🜢','🜣','🜤','🜥','🜦','🜧','🜨','🜩','🜪','🜫','🜬','🜭','🜮','🜯','🜰','🜱','🜲','🜳','🜴','🜵','🜶','🜷','🜸','🜹','🜺','🜻','🜼','🜽','🜾','🜿'],
  astro:['☉','☽','☿','♀','♁','♂','♃','♄','♅','♆','♇','⛎','♈','♉','♊','♋','♌','♍','♎','♏','♐','♑','♒','♓','★','☆','✦','✧','⊕','⊗','⊙'],
  futhark:['ᚠ','ᚢ','ᚦ','ᚨ','ᚱ','ᚲ','ᚷ','ᚹ','ᚺ','ᚾ','ᛁ','ᛃ','ᛇ','ᛈ','ᛉ','ᛊ','ᛏ','ᛒ','ᛖ','ᛗ','ᛚ','ᛜ','ᛞ','ᛟ'],
  greek:['Α','Β','Γ','Δ','Ε','Ζ','Η','Θ','Ι','Κ','Λ','Μ','Ν','Ξ','Ο','Π','Ρ','Σ','Τ','Υ','Φ','Χ','Ψ','Ω','α','β','γ','δ','ε','ζ','η','θ'],
  geo:['◈','◇','◆','◎','⊛','⊜','⊝','⊞','⊟','⊠','⊡','▲','△','▽','▼','◁','▷','◯','⬡','⬢','⬣','✦','✧','✩','✪','✫','✬','✭','✮','✯','✰'],
  occult:['☽','☾','⛤','⛧','✡','☸','☯','☩','☦','✝','♾','⚕','⚚','⚜','⚝','⚞','⚟','⚠','⚡','⚢','⚣','⚤','⚥','⚦','⚧','⚨','⚩','⛎','⚬','⚭','⚮'],
  latin:'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
  arabic:['ا','ب','ت','ث','ج','ح','خ','د','ذ','ر','ز','س','ش','ص','ض','ط','ظ','ع','غ','ف','ق','ك','ل','م','ن','ه','و','ي'],
  custom:[]
};

let selectedSymbols=[];

// ── color palettes ──
const COLS={
  gold:'#FFD700',silver:'#D0D0D0',cyan:'#00FFFF',rose:'#FF69B4',
  emerald:'#00FF88',purple:'#BB88FF',crimson:'#FF3333',azure:'#4488FF',
  amber:'#FFAA00',white:'#FFFFFF',teal:'#00CCBB',lime:'#AAFF00'
};
const GLOWS={
  gold:'#AA6600',silver:'#808080',cyan:'#006688',rose:'#880044',
  emerald:'#006622',purple:'#440088',crimson:'#660000',azure:'#001188',
  amber:'#884400',white:'#888888',teal:'#005544',lime:'#448800'
};
const BGS={'#000000':'Black','#070010':'Deep void','#000820':'Night sea','#100008':'Blood dark','#081000':'Forest','#0d0900':'Parchment','#1a1a2e':'Midnight'};

// ── state ──

// ── Canvas ──
const CV=document.getElementById('c');
const ctx=CV.getContext('2d',{willReadFrequently:true});
function resize(){
  const sz=Math.min(window.innerWidth,window.innerHeight);
  CV.width=CV.height=sz;
  if(!S.anim)render();
}
window.addEventListener('resize',resize);
window.addEventListener('orientationchange',()=>setTimeout(resize,150));

// ── State ──
let S={
  style:'star',pts:6,rings:3,detail:3,scale:100,lw:1.2,glow:16,opacity:1,rotate:0,speed:5,
  color:'#FFD700',glow2:'#AA6600',color2:'#BB88FF',bg:'#000000',
  anim:false,sparks:false,dual:false,pulse:false,mirror:false,
  transparentBg:false,gifTranspMode:'none',
  symSize:16,symR:100,symbols:[],
  tr:[
    {text:'🜀 🜁 🜂 🜃 🜄 🜅 🜆 🜇',r:108,s:13,sp:14,off:0,flip:false},
    {text:'ᚠ ᚢ ᚦ ᚨ ᚱ ᚲ ᚷ ᚹ ᚺ ᚾ ᛁ ᛃ',r:92,s:11,sp:12,off:20,flip:true},
    {text:'',s:20,y:0}
  ],
  layers:{outer:true,inner:true,geom:true,nodes:true,spokes:true,ticks:true,center:true,symbols:true,textRings:true,sparks:true},
  detail2:{cross:true,double:true,dash:false,starFill:false,nodeRings:true,nodeSz:6,tickMul:2,
            spokeSkip:1,centerPat:0,spokeInner:5,spokeOuter:95,spokeMul:1,spokeStyle:'solid',spokeOffset:0,
            nodeStyle:'circle',nodeFill:false,nodeOffset:0,nodeMul:1,nodeOpacity:1.0},
  speeds:{circle:[1,1],dual:[1,1],text1:[1,3],text2:[1,3],symbols:[1,1],sigil:[1,4]},
  sigil:{active:false,intention:'',reduction:'dupes',grid:'circle',lineStyle:'bezier',
          terminal:'dot',smooth:0.4,scale:70,rotate:0,opacity:0.7,weight:1.0,
          blendMode:'normal',syncPts:false,letters:[],color:'same',symmetry:6,offsetR:0.75}
};
let animId=null,animT=0,t=0,sparks=[];

// ── Drawing engine ──
const TAU=Math.PI*2;
function W(){return CV.width}function H(){return CV.height}function cx(){return W()/2}function cy(){return H()/2}
function baseR(){return Math.min(W(),H())*0.43*S.scale/100}

function col(a=1){
  const h=S.color;
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a*S.opacity})`;
}
function col2(a=1){
  const h=S.color2;
  const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return `rgba(${r},${g},${b},${a*S.opacity})`;
}

function ss(a=1,c=null){
  ctx.strokeStyle=c||col(a);
  ctx.shadowBlur=S.glow;
  ctx.shadowColor=S.glow2;
  ctx.lineWidth=S.lw;
}
function circ(x,y,r){ctx.beginPath();ctx.arc(x,y,r,0,TAU);ctx.stroke();}
function miniCircs(r,n,sr,rot){
  const D=S.detail2;
  const total=n*(D.nodeMul||1);
  const offsetRad=(D.nodeOffset||0)*Math.PI/180;
  const savedAlpha=ctx.globalAlpha;
  ctx.globalAlpha=savedAlpha*(D.nodeOpacity||1);
  for(let i=0;i<total;i++){
    const a=rot+offsetRad+i*TAU/total;
    const nx=cx()+r*Math.cos(a),ny=cy()+r*Math.sin(a);
    const style=D.nodeStyle||'circle';
    ctx.beginPath();
    if(style==='circle'){
      ctx.arc(nx,ny,sr,0,Math.PI*2);
    } else if(style==='square'){
      ctx.rect(nx-sr,ny-sr,sr*2,sr*2);
    } else if(style==='diamond'){
      ctx.moveTo(nx,ny-sr*1.4);ctx.lineTo(nx+sr,ny);ctx.lineTo(nx,ny+sr*1.4);ctx.lineTo(nx-sr,ny);ctx.closePath();
    } else if(style==='cross'){
      ctx.moveTo(nx-sr,ny);ctx.lineTo(nx+sr,ny);ctx.moveTo(nx,ny-sr);ctx.lineTo(nx,ny+sr);
    } else if(style==='triangle'){
      ctx.moveTo(nx,ny-sr*1.3);ctx.lineTo(nx+sr*1.1,ny+sr*0.8);ctx.lineTo(nx-sr*1.1,ny+sr*0.8);ctx.closePath();
    }
    if(style==='cross'){
      ctx.stroke();
    } else if(D.nodeFill){
      ctx.fill();ctx.stroke();
    } else {
      ctx.stroke();
    }
  }
  ctx.globalAlpha=savedAlpha;
}
function starPoly(r,n,skip,rot){
  const pts=[];for(let i=0;i<n;i++)pts.push([cx()+r*Math.cos(rot+i*TAU/n),cy()+r*Math.sin(rot+i*TAU/n)]);
  ctx.beginPath();for(let i=0;i<n;i++){const[x,y]=pts[(i*skip)%n];i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}ctx.closePath();ctx.stroke();
}
function tickMarks(r,n,len,rot){
  const mul=S.detail2.tickMul;
  const total=n*mul;
  for(let i=0;i<total;i++){const a=rot+i*TAU/total;ctx.beginPath();ctx.moveTo(cx()+(r-len)*Math.cos(a),cy()+(r-len)*Math.sin(a));ctx.lineTo(cx()+(r+len)*Math.cos(a),cy()+(r+len)*Math.sin(a));ctx.stroke();}
}
function spokeDraw(r1,r2,n,rot){
  if(!S.layers.spokes)return;
  const D=S.detail2,sk=D.spokeSkip;
  // Apply inner/outer radius overrides as fraction of the passed-in r1/r2
  const ri=r1+(r2-r1)*(D.spokeInner/100);
  const ro=r1+(r2-r1)*(D.spokeOuter/100);
  const offsetRad=(D.spokeOffset||0)*Math.PI/180;
  const total=n*(D.spokeMul||1);
  const savedLW=ctx.lineWidth;
  for(let i=0;i<total;i+=sk){
    const a=rot+offsetRad+i*TAU/total;
    ctx.beginPath();
    if(D.spokeStyle==='tapered'){
      // tapered: wide at outer, narrow at inner using quadratic trick
      ctx.lineWidth=savedLW*0.3;
    } else if(D.spokeStyle==='dashed'){
      ctx.setLineDash([6,5]);
    } else if(D.spokeStyle==='dotted'){
      ctx.setLineDash([2,6]);
    }
    ctx.moveTo(cx()+ri*Math.cos(a),cy()+ri*Math.sin(a));
    ctx.lineTo(cx()+ro*Math.cos(a),cy()+ro*Math.sin(a));
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.lineWidth=savedLW;
    // Tapered: draw second wider line over outer 40%
    if(D.spokeStyle==='tapered'){
      const midR=ri+(ro-ri)*0.6;
      ctx.lineWidth=savedLW*1.2;
      ctx.beginPath();
      ctx.moveTo(cx()+midR*Math.cos(a),cy()+midR*Math.sin(a));
      ctx.lineTo(cx()+ro*Math.cos(a),cy()+ro*Math.sin(a));
      ctx.stroke();
      ctx.lineWidth=savedLW;
    }
  }
}
function polyN(r,rot,sides){
  ctx.save();ctx.translate(cx(),cy());ctx.rotate(rot);
  ctx.beginPath();for(let i=0;i<sides;i++){const a=i*TAU/sides-Math.PI/2;i===0?ctx.moveTo(r*Math.cos(a),r*Math.sin(a)):ctx.lineTo(r*Math.cos(a),r*Math.sin(a));}
  ctx.closePath();ctx.stroke();ctx.restore();
}

// ── center detail patterns ──
function drawCenter(R,r2,pat){
  const D=S.detail2,L=S.layers;
  if(!L.center)return;
  const lw=S.lw;
  // pat 0 = simple dot (original)
  // pat 1–4 = progressively richer per-style (called with style context)
  // This generic fallback is overridden per style below
  ctx.lineWidth=lw*1.5;circ(cx(),cy(),R*0.07);ctx.lineWidth=lw;
}

// per-style center patterns: drawCenterFor(style, R, r2)
function drawCenterFor(style,R,r2){
  const D=S.detail2,L=S.layers;
  if(!L.center)return;
  const p=D.centerPat,lw=S.lw;
  ctx.save();

  if(style==='star'){
    const skip=Math.max(2,Math.floor(S.pts/2));
    if(p===0){ctx.lineWidth=lw*1.5;circ(cx(),cy(),R*0.07);ctx.lineWidth=lw;}
    else if(p===1){circ(cx(),cy(),R*0.12);circ(cx(),cy(),R*0.06);}
    else if(p===2){circ(cx(),cy(),R*0.14);starPoly(R*0.1,S.pts,skip,r2);}
    else if(p===3){circ(cx(),cy(),R*0.18);circ(cx(),cy(),R*0.1);starPoly(R*0.14,S.pts,skip,r2+Math.PI/S.pts);miniCircs(R*0.1,S.pts,D.nodeSz*0.7,r2);}
    else{circ(cx(),cy(),R*0.22);circ(cx(),cy(),R*0.14);circ(cx(),cy(),R*0.07);starPoly(R*0.19,S.pts,skip,r2);starPoly(R*0.11,S.pts,skip,r2+Math.PI/S.pts);miniCircs(R*0.14,S.pts,D.nodeSz,r2);}
  }
  else if(style==='orbital'){
    if(p===0){ctx.lineWidth=lw*2;circ(cx(),cy(),R*0.06);ctx.lineWidth=lw;}

// ── draw styles ──
function drawStyle(style,R,rot,er,alpha=1,useCol2=false){
  const r2=rot+er;
  const n=S.pts,d=S.detail,L=S.layers,D=S.detail2;
  const c=useCol2?col2:col;
  ss(alpha);if(useCol2)ctx.strokeStyle=c(alpha);

  const setDash=(on)=>ctx.setLineDash(on?[4,4]:[]);

  if(style==='star'){
    const skip=Math.max(2,Math.floor(n/2));
    for(let i=0;i<S.rings;i++){
      const r=R*(1-i*0.16);
      if(L.outer)circ(cx(),cy(),r);
      if(D.double&&i===0){setDash(D.dash);ctx.lineWidth=S.lw*0.5;circ(cx(),cy(),r*1.03);ctx.lineWidth=S.lw;setDash(false);}
      if(L.geom)starPoly(r*0.87,n,skip,r2+i*0.1);
      if(d>1&&L.nodes)miniCircs(r,n,D.nodeSz,r2);
      if(d>2&&L.ticks)tickMarks(r,n,6,r2+Math.PI/n);
    }
    if(D.cross&&d>1)spokeDraw(R*0.05,R*0.5,n*2,r2+Math.PI/(n*2));
    if(d>2&&L.nodes)miniCircs(R*0.3,n,D.nodeSz*1.2,r2);
    if(d>3){if(L.inner)circ(cx(),cy(),R*0.2);if(L.geom)starPoly(R*0.18,n,skip,r2+Math.PI/n);}
    drawCenterFor('star',R,r2);
  }
  else if(style==='orbital'){
    if(L.outer)circ(cx(),cy(),R);
    for(let i=0;i<S.rings;i++){
      const r=R*(0.82-i*0.16);if(r<8)break;
      if(L.inner)circ(cx(),cy(),r);
      if(D.double){ctx.lineWidth=S.lw*0.5;circ(cx(),cy(),r*1.04);ctx.lineWidth=S.lw;}
      if(d>1&&L.nodes){const nr=D.nodeRings?r*0.09:D.nodeSz;miniCircs(r,n,nr,r2+i*0.25);}
    }
    if(d>2){spokeDraw(R*0.1,R*0.9,n,r2);if(L.nodes)miniCircs(R*0.9,n,D.nodeSz,r2);}
    if(d>3&&L.nodes)miniCircs(R*0.48,n,D.nodeSz,r2+Math.PI/n);
    drawCenterFor('orbital',R,r2);
  }

    if(L.outer)circ(cx(),cy(),R);

    if(L.geom){polyN(R*0.67,r2,3);polyN(R*0.67,r2+Math.PI,3);polyN(R*0.44,r2+Math.PI/4,4);}
    if(d>1){if(L.geom)polyN(R*0.55,r2,4);if(L.nodes)miniCircs(R,n,D.nodeSz,r2);}
    if(d>2){if(L.inner)circ(cx(),cy(),R*0.3);if(L.geom)starPoly(R*0.27,6,2,r2);}
    if(d>3&&L.nodes)miniCircs(R*0.77,n,D.nodeSz,r2);
    drawCenterFor('alchemic',R,r2);
    for(let i=0;i<S.rings-1;i++){ctx.lineWidth=S.lw*0.5;if(L.ticks)tickMarks(R*(0.87+i*0.055),n,8,r2);ctx.lineWidth=S.lw;}
  }
  else if(style==='pentagram'){
    for(let i=0;i<S.rings;i++){
      const r=R*(1-i*0.16);
      if(L.outer)circ(cx(),cy(),r);
      const pp=[];for(let j=0;j<5;j++)pp.push([cx()+r*0.87*Math.cos(r2-Math.PI/2+j*TAU/5),cy()+r*0.87*Math.sin(r2-Math.PI/2+j*TAU/5)]);

      if(d>1&&L.nodes)miniCircs(r,5,D.nodeSz,r2-Math.PI/2);
    }
    if(d>2){spokeDraw(R*0.2,R*0.57,5,r2-Math.PI/2);if(L.inner)circ(cx(),cy(),R*0.27);}
    if(d>3){if(L.ticks)tickMarks(R*0.97,10,7,r2);if(L.nodes)miniCircs(R*0.54,5,D.nodeSz,r2+Math.PI/5);}
    drawCenterFor('pentagram',R,r2);
  }
  else if(style==='mandala'){
    for(let i=0;i<=S.rings;i++){
      const r=R*(1-i*0.13);if(r<8)break;
      circ(cx(),cy(),r);
      if(D.double){ctx.lineWidth=S.lw*0.4;circ(cx(),cy(),r*1.03);ctx.lineWidth=S.lw;}
      if(d>1&&i<S.rings&&L.ticks)tickMarks(r-R*0.065,n*2,5,r2+(i%2)*Math.PI/n);
    }
    spokeDraw(R*0.05,R*0.88,n,r2);
    if(d>1&&L.nodes){for(let i=0;i<n;i++){const a=r2+i*TAU/n;circ(cx()+(R*0.42)*Math.cos(a),cy()+(R*0.42)*Math.sin(a),D.nodeSz*1.4);}}
    if(d>2&&L.geom)starPoly(R*0.5,n,Math.max(2,Math.floor(n/2)),r2);
    if(d>3&&L.nodes)miniCircs(R*0.75,n*2,D.nodeSz*0.7,r2+Math.PI/n);
    drawCenterFor('mandala',R,r2);
  }
  else if(style==='celtic'){
    if(L.outer)circ(cx(),cy(),R);
    for(let i=0;i<n;i++){
      const a=r2+i*TAU/n,b=r2+(i+2)*TAU/n;
      const x1=cx()+R*0.74*Math.cos(a),y1=cy()+R*0.74*Math.sin(a);
      const x2=cx()+R*0.74*Math.cos(b),y2=cy()+R*0.74*Math.sin(b);
      if(L.geom){ctx.beginPath();ctx.moveTo(x1,y1);const mx=(x1+x2)/2+(y2-y1)*0.3,my=(y1+y2)/2-(x2-x1)*0.3;ctx.quadraticCurveTo(mx,my,x2,y2);ctx.stroke();}
      if(L.nodes)circ(x1,y1,D.nodeSz);
    }
    for(let i=0;i<S.rings-1;i++){if(L.inner)circ(cx(),cy(),R*(0.52-i*0.14));}
    if(d>2&&L.ticks)tickMarks(R*0.97,n*3,5,r2);
    if(d>3&&L.geom)starPoly(R*0.44,n,Math.max(2,Math.floor(n/2)),r2);
    drawCenterFor('celtic',R,r2);
  }
  else if(style==='sigil'){
    if(L.outer)circ(cx(),cy(),R);
    const verts=[];for(let i=0;i<n;i++){const a=r2+i*TAU/n;verts.push([cx()+R*0.79*Math.cos(a),cy()+R*0.79*Math.sin(a)]);}
    if(L.geom){ctx.beginPath();ctx.moveTo(verts[0][0],verts[0][1]);for(let i=1;i<verts.length;i++)ctx.lineTo(verts[i][0],verts[i][1]);ctx.closePath();ctx.stroke();}
    if(L.nodes)for(const[px,py]of verts)circ(px,py,D.nodeSz);
    if(d>1){if(L.inner)circ(cx(),cy(),R*0.49);if(L.geom)starPoly(R*0.47,n,2,r2+Math.PI/n);}
    if(d>2){spokeDraw(R*0.08,R*0.74,n,r2);if(L.ticks)tickMarks(R*0.96,n*4,5,r2);}
    if(d>3){if(L.inner)circ(cx(),cy(),R*0.24);if(L.nodes)miniCircs(R*0.49,n,D.nodeSz*0.7,r2+Math.PI/(n*2));}
    drawCenterFor('sigil',R,r2);
  }
  else if(style==='rose'){
    if(L.outer)circ(cx(),cy(),R);
    const petals=n;
    for(let p=0;p<petals;p++){
      const pa=r2+p*TAU/petals;
      const pr=R*0.38,pcx=cx()+pr*Math.cos(pa),pcy=cy()+pr*Math.sin(pa);
      if(L.geom){ctx.beginPath();ctx.arc(pcx,pcy,pr,0,TAU);ctx.stroke();}
    }
    for(let i=1;i<S.rings;i++)if(L.inner)circ(cx(),cy(),R*(1-i*0.25));
    if(d>2)starPoly(R*0.35,petals,Math.max(2,Math.floor(petals/2)),r2);
    if(d>3){miniCircs(R,petals,D.nodeSz,r2);spokeDraw(R*0.05,R*0.62,petals,r2+Math.PI/petals);}
    drawCenterFor('rose',R,r2);
  }
  else if(style==='enochian'){
    if(L.outer)circ(cx(),cy(),R);
    const tables=4,sq=R*0.55;
    if(L.geom){
      for(let i=0;i<tables;i++){
        const a=r2+i*TAU/tables;
        ctx.save();ctx.translate(cx()+R*0.45*Math.cos(a),cy()+R*0.45*Math.sin(a));ctx.rotate(a);
        ctx.strokeRect(-sq*0.28,-sq*0.28,sq*0.56,sq*0.56);
        if(d>2){ctx.beginPath();ctx.moveTo(-sq*0.28,0);ctx.lineTo(sq*0.28,0);ctx.moveTo(0,-sq*0.28);ctx.lineTo(0,sq*0.28);ctx.stroke();}
        ctx.restore();
      }
      starPoly(R*0.52,tables*2,2,r2+Math.PI/tables);
    }
    if(L.inner)circ(cx(),cy(),R*0.22);
    if(d>1&&L.spokes)spokeDraw(R*0.22,R*0.65,tables*2,r2);
    if(d>3){if(L.nodes)miniCircs(R,n,D.nodeSz,r2);if(L.ticks)tickMarks(R*0.97,n*3,6,r2);}
    drawCenterFor('enochian',R,r2);
  }

  else if(style==='sacred'){
    // Flower of Life / Vesica Piscis geometry
    if(L.outer)circ(cx(),cy(),R);
    const cr=R*0.5; // cell radius
    if(L.geom){
      // central circle
      circ(cx(),cy(),cr);
      // 6 surrounding circles at cr distance
      for(let i=0;i<6;i++){
        const a=r2+i*TAU/6;
        const ox=cx()+cr*Math.cos(a),oy=cy()+cr*Math.sin(a);
        circ(ox,oy,cr);
      }
      if(d>1){
        // second ring of 6
        for(let i=0;i<6;i++){
          const a=r2+Math.PI/6+i*TAU/6;
          circ(cx()+cr*Math.sqrt(3)*Math.cos(a),cy()+cr*Math.sqrt(3)*Math.sin(a),cr);
        }
      }
    }
    for(let i=1;i<S.rings;i++)if(L.inner)circ(cx(),cy(),R*(1-i*0.22));
    if(d>2&&L.ticks)tickMarks(R*0.97,6*D.tickMul,7,r2);
    if(d>3&&L.nodes)miniCircs(R*0.5,6,D.nodeSz,r2);
    drawCenterFor('sacred',R,r2);
  }
  else if(style==='compass'){
    // Compass rose / navigation wheel
    if(L.outer)circ(cx(),cy(),R);
    if(D.double){ctx.lineWidth=S.lw*0.5;circ(cx(),cy(),R*1.02);ctx.lineWidth=S.lw;}
    const pts8=8,pts16=16;
    // Cardinal & intercardinal points — long and short spokes
    for(let i=0;i<pts16;i++){
      const a=r2+i*TAU/pts16;
      const long=i%2===0;
      const r1=R*0.08,r2e=long?R*0.88:R*0.72;
      if(L.spokes){ctx.beginPath();ctx.moveTo(cx()+r1*Math.cos(a),cy()+r1*Math.sin(a));ctx.lineTo(cx()+r2e*Math.cos(a),cy()+r2e*Math.sin(a));ctx.stroke();}
      // Diamond arrowhead on cardinals
      if(long&&L.geom){
        const tip=R*0.94,w=R*0.04;
        const nx=Math.cos(a),ny=Math.sin(a),px2=-ny,py2=nx;
        ctx.beginPath();
        ctx.moveTo(cx()+tip*nx,cy()+tip*ny);
        ctx.lineTo(cx()+r2e*nx+w*px2,cy()+r2e*ny+w*py2);
        ctx.lineTo(cx()+(r2e-R*0.06)*nx,cy()+(r2e-R*0.06)*ny);
        ctx.lineTo(cx()+r2e*nx-w*px2,cy()+r2e*ny-w*py2);
        ctx.closePath();ctx.stroke();
      }
    }
    for(let i=1;i<S.rings;i++){const r=R*(0.65-i*0.15);if(r>8)circ(cx(),cy(),r);}
    if(d>1&&L.ticks)tickMarks(R*0.97,32,4,r2+TAU/64);
    if(d>2&&L.nodes)miniCircs(R*0.65,8,D.nodeSz,r2);
    if(d>3&&L.geom)starPoly(R*0.62,8,3,r2+Math.PI/8);
    drawCenterFor('compass',R,r2);
  }
  else if(style==='labyrinth'){
    // Concentric square / rectangular labyrinth paths
    if(L.outer)circ(cx(),cy(),R);
    const steps=Math.min(S.rings+2,7);
    for(let i=0;i<steps;i++){
      const r=R*(1-i*0.13);if(r<10)break;
      // alternating circle and rounded-square
      if(i%2===0){
        if(L.inner||i===0)circ(cx(),cy(),r);
      } else {
        if(L.geom){
          ctx.save();ctx.translate(cx(),cy());ctx.rotate(r2);
          const s=r*0.92;
          ctx.beginPath();
          // rounded square via arcs
          const rad=r*0.15;
          ctx.moveTo(-s+rad,-s);ctx.lineTo(s-rad,-s);ctx.arcTo(s,-s,s,-s+rad,rad);
          ctx.lineTo(s,s-rad);ctx.arcTo(s,s,s-rad,s,rad);
          ctx.lineTo(-s+rad,s);ctx.arcTo(-s,s,-s,s-rad,rad);
          ctx.lineTo(-s,-s+rad);ctx.arcTo(-s,-s,-s+rad,-s,rad);
          ctx.closePath();ctx.stroke();
          ctx.restore();
        }
      }
      // gaps / passages: short gap breaks drawn as ticks
      if(d>1&&L.ticks)tickMarks(r,4,r*0.08,r2+i*Math.PI/4);
    }
    if(d>2&&L.spokes)spokeDraw(R*0.05,R*0.5,4,r2+Math.PI/4);
    if(d>3&&L.nodes)miniCircs(R*0.5,4,D.nodeSz*1.2,r2);
    drawCenterFor('labyrinth',R,r2);
  }
  else if(style==='zodiac'){
    // 12-segment wheel with house dividers
    if(L.outer)circ(cx(),cy(),R);
    const seg=12;
    for(let i=0;i<seg;i++){
      const a=r2+i*TAU/seg;
      // dividing spokes
      if(L.geom&&L.spokes){
        const sk=S.detail2.spokeSkip;
        if(i%sk===0){ctx.beginPath();ctx.moveTo(cx()+R*0.35*Math.cos(a),cy()+R*0.35*Math.sin(a));ctx.lineTo(cx()+R*0.97*Math.cos(a),cy()+R*0.97*Math.sin(a));ctx.stroke();}
      }
      // Node at each house cusp on outer ring
      if(L.nodes)circ(cx()+R*0.88*Math.cos(a+TAU/24),cy()+R*0.88*Math.sin(a+TAU/24),D.nodeSz);
    }
    // Ring structure
    for(let i=0;i<S.rings;i++){
      const r=R*(1-i*0.18);if(r<10)break;
      if(L.inner||i===0)circ(cx(),cy(),r);
    }
    if(d>1&&L.ticks)tickMarks(R*0.97,seg*3,5,r2+TAU/72);
    if(d>2&&L.geom){
      // 4 element triangles (fire/water/earth/air)
      polyN(R*0.32,r2,3);polyN(R*0.32,r2+Math.PI,3);
    }
    if(d>3&&L.nodes)miniCircs(R*0.35,seg,D.nodeSz*0.7,r2+TAU/24);
    drawCenterFor('zodiac',R,r2);
  }
  else if(style==='fractal'){
    // Recursive ring patterns — each ring spawns satellite circles
    if(L.outer)circ(cx(),cy(),R);
    const levels=Math.min(S.rings,5);
    function fracRing(ox,oy,r,depth,rot3){
      if(depth>levels||r<4)return;
      if(L.inner||depth===0)circ(ox,oy,r);
      if(depth<levels){
        const childR=r*0.38,count=n;
        for(let i=0;i<count;i++){
          const a=rot3+i*TAU/count;
          const cx2=ox+r*0.67*Math.cos(a),cy2=oy+r*0.67*Math.sin(a);
          fracRing(cx2,cy2,childR,depth+1,rot3+Math.PI/count);
        }
      }
    }
    fracRing(cx(),cy(),R*0.7,0,r2);
    if(d>1&&L.ticks)tickMarks(R*0.97,n*D.tickMul,5,r2);
    if(d>2&&L.nodes)miniCircs(R,n,D.nodeSz,r2);
    if(d>3&&L.geom)starPoly(R*0.68,n,Math.max(2,Math.floor(n/2)),r2);
    drawCenterFor('fractal',R,r2);
  }
  else if(style==='gothic'){
    // Gothic arch / cathedral window geometry
    if(L.outer)circ(cx(),cy(),R);
    const arches=n;
    for(let i=0;i<arches;i++){
      const a=r2+i*TAU/arches,b=r2+(i+1)*TAU/arches;
      const x1=cx()+R*0.82*Math.cos(a),y1=cy()+R*0.82*Math.sin(a);
      const x2=cx()+R*0.82*Math.cos(b),y2=cy()+R*0.82*Math.sin(b);
      if(L.geom){
        // pointed arch between adjacent points
        const mx=(x1+x2)/2,my=(y1+y2)/2;
        const dist=Math.hypot(x2-x1,y2-y1)*0.6;
        const nx2=-(y2-y1)/Math.hypot(x2-x1,y2-y1),ny2=(x2-x1)/Math.hypot(x2-x1,y2-y1);
        const peak=0.55;
        ctx.beginPath();
        ctx.moveTo(x1,y1);
        ctx.quadraticCurveTo(mx+nx2*dist*peak,my+ny2*dist*peak,mx,my);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(x2,y2);
        ctx.quadraticCurveTo(mx+nx2*dist*peak,my+ny2*dist*peak,mx,my);
        ctx.stroke();
      }
      if(L.nodes)circ(x1,y1,D.nodeSz);
    }
    for(let i=1;i<S.rings;i++){const r=R*(1-i*0.2);if(r>8){if(L.inner)circ(cx(),cy(),r);}}
    if(d>1&&L.ticks)tickMarks(R*0.97,arches*D.tickMul,6,r2+TAU/(arches*2));
    if(d>2&&L.geom){
      // trefoil: 3 overlapping circles
      for(let i=0;i<3;i++){const a=r2+i*TAU/3;circ(cx()+R*0.18*Math.cos(a),cy()+R*0.18*Math.sin(a),R*0.18);}
    }
    if(d>3&&L.nodes)miniCircs(R*0.6,arches,D.nodeSz*0.7,r2+TAU/(arches*2));
    drawCenterFor('gothic',R,r2);
  }
  else if(style==='norse'){
    // Norse / Vegvisir — rune compass with 8 stave arms
    if(L.outer)circ(cx(),cy(),R);
    if(D.double){ctx.lineWidth=S.lw*0.5;circ(cx(),cy(),R*1.03);ctx.lineWidth=S.lw;}
    const arms=8;
    for(let i=0;i<arms;i++){
      const a=r2+i*TAU/arms;
      const even=i%2===0;
      if(L.spokes){
        ctx.beginPath();ctx.moveTo(cx()+R*0.08*Math.cos(a),cy()+R*0.08*Math.sin(a));
        ctx.lineTo(cx()+R*0.78*Math.cos(a),cy()+R*0.78*Math.sin(a));ctx.stroke();
      }
      if(L.geom){
        // stave tip: forked or hooked
        const tipR=R*0.78,forkLen=R*0.12,forkAngle=Math.PI/5;
        if(even){
          // forked tip
          ctx.beginPath();ctx.moveTo(cx()+tipR*Math.cos(a),cy()+tipR*Math.sin(a));
          ctx.lineTo(cx()+(tipR+forkLen)*Math.cos(a+forkAngle),cy()+(tipR+forkLen)*Math.sin(a+forkAngle));ctx.stroke();
          ctx.beginPath();ctx.moveTo(cx()+tipR*Math.cos(a),cy()+tipR*Math.sin(a));
          ctx.lineTo(cx()+(tipR+forkLen)*Math.cos(a-forkAngle),cy()+(tipR+forkLen)*Math.sin(a-forkAngle));ctx.stroke();
          // crossbar
          const cbR=R*0.5;
          ctx.beginPath();ctx.moveTo(cx()+cbR*Math.cos(a)+forkLen*Math.cos(a+Math.PI/2),cy()+cbR*Math.sin(a)+forkLen*Math.sin(a+Math.PI/2));
          ctx.lineTo(cx()+cbR*Math.cos(a)-forkLen*Math.cos(a+Math.PI/2),cy()+cbR*Math.sin(a)-forkLen*Math.sin(a+Math.PI/2));ctx.stroke();
        } else {
          // hooked tip
          ctx.beginPath();ctx.moveTo(cx()+tipR*Math.cos(a),cy()+tipR*Math.sin(a));
          ctx.lineTo(cx()+(tipR+forkLen)*Math.cos(a+forkAngle*1.5),cy()+(tipR+forkLen)*Math.sin(a+forkAngle*1.5));ctx.stroke();
          // double crossbar
          [0.35,0.6].forEach(frac=>{
            const cbR2=R*frac;
            ctx.beginPath();ctx.moveTo(cx()+cbR2*Math.cos(a)+R*0.07*Math.cos(a+Math.PI/2),cy()+cbR2*Math.sin(a)+R*0.07*Math.sin(a+Math.PI/2));
            ctx.lineTo(cx()+cbR2*Math.cos(a)-R*0.07*Math.cos(a+Math.PI/2),cy()+cbR2*Math.sin(a)-R*0.07*Math.sin(a+Math.PI/2));ctx.stroke();
          });
        }
      }
    }
    for(let i=0;i<S.rings-1;i++){const r=R*(0.85-i*0.2);if(r>8&&L.inner)circ(cx(),cy(),r);}
    if(d>1&&L.ticks)tickMarks(R*0.97,arms*D.tickMul,5,r2+TAU/32);
    if(d>2&&L.nodes)miniCircs(R*0.85,arms,D.nodeSz,r2);
    if(d>3&&L.geom)starPoly(R*0.28,8,3,r2);
    drawCenterFor('norse',R,r2);
  }
  else if(style==='chaos'){
    // Chaos star — 8-pointed star with chaotic inner web
    if(L.outer)circ(cx(),cy(),R);
    if(D.double){ctx.lineWidth=S.lw*0.5;circ(cx(),cy(),R*1.03);ctx.lineWidth=S.lw;}
    const arms=8;
    // main 8 arrows
    for(let i=0;i<arms;i++){
      const a=r2+i*TAU/arms;
      if(L.spokes){ctx.beginPath();ctx.moveTo(cx(),cy());ctx.lineTo(cx()+R*0.9*Math.cos(a),cy()+R*0.9*Math.sin(a));ctx.stroke();}
      if(L.geom){
        // arrowhead
        const tipR=R*0.92,hw=R*0.05,hs=R*0.1;
        const nx=Math.cos(a),ny=Math.sin(a),px2=-ny,py2=nx;
        ctx.beginPath();
        ctx.moveTo(cx()+tipR*nx,cy()+tipR*ny);
        ctx.lineTo(cx()+(tipR-hs)*nx+hw*px2,cy()+(tipR-hs)*ny+hw*py2);
        ctx.lineTo(cx()+(tipR-hs)*nx-hw*px2,cy()+(tipR-hs)*ny-hw*py2);
        ctx.closePath();ctx.stroke();
      }
    }
    for(let i=1;i<S.rings;i++){const r=R*(1-i*0.2);if(r>8&&L.inner)circ(cx(),cy(),r);}
    // chaotic inner web: connect every arm to every other arm at mid-radius
    if(d>1&&L.geom){
      const webR=R*0.45;
      const wpts=[];for(let i=0;i<arms;i++)wpts.push([cx()+webR*Math.cos(r2+i*TAU/arms),cy()+webR*Math.sin(r2+i*TAU/arms)]);
      for(let i=0;i<arms;i++)for(let j=i+2;j<arms;j+=2){
        ctx.beginPath();ctx.moveTo(wpts[i][0],wpts[i][1]);ctx.lineTo(wpts[j][0],wpts[j][1]);ctx.stroke();
      }
    }
    if(d>2&&L.nodes)miniCircs(R*0.45,arms,D.nodeSz,r2);
    if(d>3&&L.ticks)tickMarks(R*0.97,arms*D.tickMul,6,r2+TAU/32);
    drawCenterFor('chaos',R,r2);
  }
}

// ── curved text on ring ──
function drawTextRing(text,radiusPct,fontSize,letterSpacing,offsetDeg,flip,animOffset){
  if(!text.trim())return;
  const chars=[...text];
  const R=baseR()*radiusPct/100;
  const r=R*(flip?-1:1);
  const offsetRad=(offsetDeg*Math.PI/180)+animOffset;
  ctx.save();
  ctx.font=`${fontSize}px serif`;
  ctx.fillStyle=col(0.8);
  ctx.shadowBlur=S.glow*0.5;
  ctx.shadowColor=S.glow2;
  const arcLen=chars.length*letterSpacing;
  const startAngle=offsetRad - (arcLen/(R))/2;
  chars.forEach((ch,i)=>{
    const angle=startAngle+(i*letterSpacing)/R;
    ctx.save();
    ctx.translate(cx()+R*Math.cos(angle),cy()+R*Math.sin(angle));
    ctx.rotate(angle+(flip?-Math.PI/2:Math.PI/2));
    ctx.fillText(ch,0,0);
    ctx.restore();
  });
  ctx.restore();
}

// ── center text ──
function drawCenterText(text,fontSize,yOff){
  if(!text.trim())return;
  ctx.save();
  ctx.font=`${fontSize}px serif`;
  ctx.fillStyle=col(0.9);
  ctx.shadowBlur=S.glow;ctx.shadowColor=S.glow2;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,cx(),cy()+yOff);
  ctx.restore();
}

// ── symbols on ring ──
function drawSymbols(extraRot){
  if(!S.layers.symbols||!S.symbols.length)return;
  const syms=S.symbols;
  const R=baseR()*S.symR/100;
  const rot=S.rotate*Math.PI/180+extraRot*speedOf('symbols');
  ctx.save();
  ctx.font=`${S.symSize}px serif`;
  ctx.fillStyle=col(0.85);
  ctx.shadowBlur=S.glow;ctx.shadowColor=S.glow2;
  syms.forEach((s,i)=>{
    const a=rot+i*TAU/syms.length;
    ctx.save();
    ctx.translate(cx()+R*Math.cos(a),cy()+R*Math.sin(a));
    ctx.rotate(a+Math.PI/2);
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s,0,0);
    ctx.restore();
  });
  ctx.restore();
}

// ── particles ──
function updateSparks(){
  if(!S.layers.sparks||!S.sparks)return;
  for(const p of sparks){
    ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,p.r*(p.life/p.maxLife),0,TAU);
    ctx.fillStyle=col((p.life/p.maxLife)*0.7);
    ctx.shadowBlur=8;ctx.shadowColor=S.glow2;
    ctx.fill();ctx.restore();
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.025;p.vx*=0.99;p.life--;
  }
  for(let i=sparks.length-1;i>=0;i--)if(sparks[i].life<=0)sparks.splice(i,1);
  if(sparks.length<100){
    const a=Math.random()*TAU,R=baseR()*(0.4+Math.random()*0.65);
    sparks.push({x:cx()+R*Math.cos(a),y:cy()+R*Math.sin(a),vx:(Math.random()-.5)*1.8,vy:(Math.random()-1.8)*1.5,r:Math.random()*3+.5,life:50+Math.random()*80,maxLife:130});
  }
}

const SPEED_RATIOS=[
  [0,1,'0 (still)'],[1,6,'1/6'],[1,5,'1/5'],[1,4,'1/4'],[1,3,'1/3'],[1,2,'1/2'],

];
function ratioToDecimal(r){return r[1]===0?0:r[0]/r[1];}
function ratioFrac(r){return [r[0],r[1]];}  // [num,den] for LCM calc
function speedOf(key){return ratioToDecimal(S.speeds[key]);}

// ── main draw ──
function draw(extraRot){
  const cw=W(),ch=H();
  ctx.clearRect(0,0,cw,ch);
  if(!S.transparentBg){ctx.fillStyle=S.bg;ctx.fillRect(0,0,cw,ch);}
  const R=baseR(),rot=S.rotate*Math.PI/180;
  const tr=S.tr;

  if(S.mirror){
    ctx.save();ctx.scale(-1,1);ctx.translate(-cw,0);
    ctx.globalAlpha=0.35;
    drawStyle(S.style,R,rot,extraRot*speedOf('circle'));
    ctx.restore();ctx.globalAlpha=1;
  }
  if(S.dual){
    ctx.globalAlpha=0.4;
    drawStyle(S.style,R*0.82,rot+Math.PI/S.pts,-extraRot*speedOf('dual'),0.6,true);
    ctx.globalAlpha=1;
  }

  let drawR=R;
  if(S.pulse){const ps=1+0.045*Math.sin(t*3);ctx.save();ctx.translate(cx(),cy());ctx.scale(ps,ps);ctx.translate(-cx(),-cy());drawR=R;}

  drawStyle(S.style,drawR,rot,extraRot*speedOf('circle'));
  if(S.pulse)ctx.restore();
  // Draw embedded sigil layer (always draws when active, regardless of geom layer)
  drawSigilOnCanvas(extraRot);

  // text rings
  if(S.layers.textRings){
    const animO1=extraRot*speedOf('text1');
    const animO2=extraRot*speedOf('text2');
    drawTextRing(tr[0].text,tr[0].r,tr[0].s,tr[0].sp,tr[0].off,tr[0].flip,animO1);
    drawTextRing(tr[1].text,tr[1].r,tr[1].s,tr[1].sp,tr[1].off,tr[1].flip,-animO2);
    drawCenterText(tr[2].text,tr[2].s,tr[2].y);
  }

  drawSymbols(extraRot);
  updateSparks();
}

// ── SYMMETRIC SIGIL ENGINE ──
// ══════════════════════════════════════════════

const VOWELS_S=new Set('AEIOU');
function sigilProcessLetters(text,mode){
  const upper=text.toUpperCase().replace(/[^A-Z]/g,'');
  if(mode==='none')return[...upper];
  const seen=new Set(),out=[];
  for(const ch of upper){
    if(seen.has(ch))continue;
    if(mode==='dupvow'&&VOWELS_S.has(ch))continue;
    seen.add(ch);out.push(ch);
  }
  return out;
}

function sigilSeededRand(seed){let s=seed|0;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}

// ── Map letters to angles on a circle ──
// Each letter gets a fixed angle on the ring; the sigil path connects them in order.
// Symmetry is achieved by ROTATING a copy of the full path by 360/symmetry degrees
// and drawing all copies — like a kaleidoscope.
function sigilLetterAngles(letters, symmetry, R, seed, gridType){
  const TAU=Math.PI*2;
  const rand=sigilSeededRand(seed);
  const angles={};
  const alpha='ABCDEFGHIJKLMNOPQRSTUVWXYZ';

  if(gridType==='circle'){
    // Letters evenly spaced: A at 0, B at 1/26, etc.
    for(let i=0;i<26;i++) angles[alpha[i]]=((i/26)*TAU)-Math.PI/2;
  } else if(gridType==='wheel'){
    // Numerology: 9 positions, letters cluster at their number
    const num={A:1,B:2,C:3,D:4,E:5,F:6,G:7,H:8,I:9,J:1,K:2,L:3,M:4,N:5,O:6,P:7,Q:8,R:9,S:1,T:2,U:3,V:4,W:5,X:6,Y:7,Z:8};
    // Spread letters sharing a number slightly so they don't pile up
    const counts={};
    const result={};
    for(const ch of alpha){
      const n=num[ch];
      counts[n]=(counts[n]||0)+1;
    }
    const placed={};
    for(const ch of alpha){
      const n=num[ch];
      placed[n]=(placed[n]||0);
      const baseAngle=((n-1)/9)*TAU-Math.PI/2;
      const spread=(TAU/9)*0.4;
      const offset=counts[n]>1?(placed[n]/(counts[n]-1)-0.5)*spread:0;
      result[ch]=baseAngle+offset;
      placed[n]++;
    }
    Object.assign(angles,result);
  } else if(gridType==='chaos'){
    // Seeded random angles on the circle
    for(const ch of alpha) angles[ch]=rand()*Math.PI*2;
  } else if(gridType==='rosecross'||gridType==='grid5'){
    // Map the grid position to an angle by treating (col,row) as a vector from center
    const rows=gridType==='grid5'?5:8, cols=3;
    for(let i=0;i<alpha.length;i++){
      const row=Math.floor(i/cols),col=i%cols;
      const dx=(col-(cols-1)/2), dy=(row-(rows-1)/2);
      angles[alpha[i]]=Math.atan2(dy,dx);
    }
  }
  return angles;
}

// Build path points for one arm of the sigil
function sigilBuildPath(letters, angles, R, offsetR, cx2, cy2){
  return letters.map(ch=>{
    const a=angles[ch]||0;
    const r=R*(offsetR);
    return{x:cx2+r*Math.cos(a), y:cy2+r*Math.sin(a)};
  }).filter(Boolean);
}

// Draw one symmetric sigil path (all rotational copies)
function drawSymSigilPath(pathPts, symmetry, cx2, cy2, lineStyle, smooth, terminal, lw, glow, glow2, sigilCol){
  if(pathPts.length<2)return;
  const TAU=Math.PI*2;
  for(let sym=0;sym<symmetry;sym++){
    const angle=(sym/symmetry)*TAU;
    ctx.save();
    ctx.translate(cx2,cy2);
    ctx.rotate(angle);
    ctx.translate(-cx2,-cy2);

    ctx.strokeStyle=sigilCol;ctx.fillStyle=sigilCol;
    ctx.lineWidth=lw;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.shadowBlur=glow;ctx.shadowColor=glow2;

    if(lineStyle==='angular'){
      ctx.beginPath();ctx.moveTo(pathPts[0].x,pathPts[0].y);
      for(let i=1;i<pathPts.length;i++)ctx.lineTo(pathPts[i].x,pathPts[i].y);
      ctx.stroke();
    } else if(lineStyle==='bezier'){
      ctx.beginPath();ctx.moveTo(pathPts[0].x,pathPts[0].y);
      for(let i=1;i<pathPts.length;i++){
        const prev=pathPts[i-1],curr=pathPts[i];
        const mx=(prev.x+curr.x)/2,my=(prev.y+curr.y)/2;
        const cp1x=prev.x+(mx-prev.x)*smooth,cp1y=prev.y+(my-prev.y)*smooth;
        const cp2x=curr.x+(mx-curr.x)*smooth,cp2y=curr.y+(my-curr.y)*smooth;
        ctx.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,curr.x,curr.y);
      }
      ctx.stroke();
    } else { // arc
      ctx.beginPath();ctx.moveTo(pathPts[0].x,pathPts[0].y);
      for(let i=1;i<pathPts.length;i++){
        const prev=pathPts[i-1],curr=pathPts[i];
        const mx=(prev.x+curr.x)/2,my=(prev.y+curr.y)/2;
        ctx.quadraticCurveTo(cx2+(mx-cx2)*smooth*0.4,cy2+(my-cy2)*smooth*0.4,curr.x,curr.y);
      }
      ctx.stroke();
    }

    // Terminals on first/last point
    if(terminal!=='none'){
      const tsz=lw*2.2;
      [pathPts[0],pathPts[pathPts.length-1]].forEach(p=>{
        if(terminal==='dot'){ctx.beginPath();ctx.arc(p.x,p.y,tsz,0,TAU);ctx.fill();}
        else if(terminal==='circle'){const pl=ctx.lineWidth;ctx.lineWidth=lw*0.6;ctx.beginPath();ctx.arc(p.x,p.y,tsz*1.6,0,TAU);ctx.stroke();ctx.lineWidth=pl;}
        else if(terminal==='diamond'){ctx.beginPath();ctx.moveTo(p.x,p.y-tsz*1.4);ctx.lineTo(p.x+tsz,p.y);ctx.lineTo(p.x,p.y+tsz*1.4);ctx.lineTo(p.x-tsz,p.y);ctx.closePath();ctx.fill();}
        else if(terminal==='cross'){const pl=ctx.lineWidth;ctx.lineWidth=lw*0.7;ctx.beginPath();ctx.moveTo(p.x-tsz,p.y);ctx.lineTo(p.x+tsz,p.y);ctx.moveTo(p.x,p.y-tsz);ctx.lineTo(p.x,p.y+tsz);ctx.stroke();ctx.lineWidth=pl;}
      });
    }
    ctx.restore();
  }
}

function drawSigilOnCanvas(extraRot){
  const sg=S.sigil;
  if(!sg.active||!Array.isArray(sg.letters)||sg.letters.length<2)return;

  const R=baseR()*sg.scale/100;
  const baseAngleOffset=sg.rotate*Math.PI/180+(extraRot||0)*speedOf('sigil');
  const symmetry=sg.symmetry||S.pts||6;
  const seed=sg.seed||42;

  // Get letter->angle mapping
  const angles=sigilLetterAngles(sg.letters,symmetry,R,seed,sg.grid);
  // Apply base rotation to all angles
  const rotatedAngles={};
  for(const [ch,a] of Object.entries(angles)) rotatedAngles[ch]=a+baseAngleOffset;

  // Build the sigil path at the configured radial offset
  const pathPts=sigilBuildPath(sg.letters,rotatedAngles,R,sg.offsetR||0.75,cx(),cy());
  if(pathPts.length<2)return;

  // Colour
  const h=sg.color==='same'?S.color:sg.color;
  const r=parseInt(h.slice(1,3),16),g2=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  const sigilCol=`rgba(${r},${g2},${b},${sg.opacity})`;

  ctx.save();
  ctx.globalCompositeOperation=sg.blendMode||'normal';

  drawSymSigilPath(
    pathPts, symmetry, cx(), cy(),
    sg.lineStyle, sg.smooth,
    sg.terminal,
    S.lw*sg.weight, S.glow*1.5, S.glow2,
    sigilCol
  );

  ctx.restore();
}

function generateSigil(){
  // Mobile uses mGenerateSigil(); this desktop version is safe via optional chaining
  const intent=(document.getElementById('sigilIntention')||document.getElementById('mSigilIntent'))?.value?.trim();
  if(!intent){S.sigil.letters=[];if(!S.anim)render();return;}
  S.sigil.intention=intent;
  S.sigil.reduction=(document.getElementById('sigilReduction')||document.getElementById('mSigilRed'))?.value||S.sigil.reduction;
  S.sigil.letters=sigilProcessLetters(intent,S.sigil.reduction);
  const dispEl=document.getElementById('sigilLetterDisplay')||document.getElementById('mSigilLetters');
  if(dispEl)dispEl.textContent=S.sigil.letters.length?'Letters: '+S.sigil.letters.join(' · '):'(no letters remaining)';
  const ptsEl=document.getElementById('tPts')||document.getElementById('mPts');
  const vPtsEl=document.getElementById('vPts')||document.getElementById('mvPts');
  if(S.sigil.syncPts&&S.sigil.letters.length>=3){
    S.pts=Math.min(16,Math.max(3,S.sigil.letters.length));
    if(ptsEl)ptsEl.value=S.pts;
    if(vPtsEl)vPtsEl.textContent=S.pts;
  }
  if(!S.anim)render();
}

function render(){draw(0);}

// ── GIF encoder ──
const GIFEncoder=(()=>{
  // NeuQuant: neural-net palette quantiser (256 colours)
  function NeuQuant(pixels,samplefac){
    const N=256,intbias=1<<16,alphabiasshift=10,initalpha=1<<alphabiasshift;
    const radbiasshift=8,radbias=1<<radbiasshift,alpharadbias=1<<(alphabiasshift+radbiasshift);
    const initrad=N>>3,radiusbiasshift=6,radiusdec=30;
    let net=[],freq=new Array(N).fill(intbias/N),bias=new Array(N).fill(0),radpower=[];
    for(let i=0;i<N;i++)net[i]=[i*256/N,i*256/N,i*256/N];
    function contest(b,g,r){
      let bd=1<<28,bbd=bd,bp=0,bbp=0;
      for(let i=0;i<N;i++){
        const n=net[i],d=Math.abs(n[0]-b)+Math.abs(n[1]-g)+Math.abs(n[2]-r);
        if(d<bd){bd=d;bp=i;}
        const biasd=d-(bias[i]>>(16-4));if(biasd<bbd){bbd=biasd;bbp=i;}
        freq[i]-=freq[i]>>3;bias[i]+=freq[i]<<4;
      }
      freq[bp]+=intbias/N|0;bias[bp]-=intbias<<(10-10);
      return bbp;
    }
    function alter(alpha,i,b,g,r){net[i][0]-=alpha*(net[i][0]-b)/initalpha;net[i][1]-=alpha*(net[i][1]-g)/initalpha;net[i][2]-=alpha*(net[i][2]-r)/initalpha;}
    function alterneigh(rad,i,b,g,r){
      const lo=Math.max(i-rad,0),hi=Math.min(i+rad,N);
      for(let j=i+1,k=i-1,m=1;j<hi||k>lo;m++){
        const a=radpower[m]||0;
        if(j<hi){net[j][0]-=a*(net[j][0]-b)/alpharadbias;net[j][1]-=a*(net[j][1]-g)/alpharadbias;net[j][2]-=a*(net[j][2]-r)/alpharadbias;j++;}
        if(k>lo){net[k][0]-=a*(net[k][0]-b)/alpharadbias;net[k][1]-=a*(net[k][1]-g)/alpharadbias;net[k][2]-=a*(net[k][2]-r)/alpharadbias;k--;}
      }
    }
    const len=pixels.length,sp=len/(4*samplefac)|0;
    let delta=Math.max(sp/100|0,1),alpha=initalpha,radius=N*4;
    let rad=radius>>6;if(rad<=1)rad=0;
    for(let i=0;i<rad;i++)radpower[i]=alpha*(((rad*rad-i*i)*radbias)/(rad*rad))|0;
    const step=len<8192?4:(len%4831?4*4831:(len%4649?4*4649:4*4783));
    for(let i=0,pix=0;i<sp;i++){
      const b=pixels[pix+2]&255,g=pixels[pix+1]&255,r=pixels[pix]&255;
      const j=contest(b,g,r);alter(alpha,j,b,g,r);if(rad)alterneigh(rad,j,b,g,r);
      pix+=step;if(pix>=len)pix-=len;
      if(i%delta===0){alpha-=alpha/(30+(samplefac-1)/3|0);radius-=radius/radiusdec;rad=radius>>6;if(rad<=1)rad=0;for(let jj=0;jj<rad;jj++)radpower[jj]=alpha*(((rad*rad-jj*jj)*radbias)/(rad*rad))|0;}
    }
    // Build palette — net[i] is stored as [b,g,r] per NeuQuant convention
    // Sort by green channel (net[i][1]) for perceptual ordering
    const order=[...Array(N).keys()].sort((a,b)=>net[a][1]-net[b][1]);
    const palette=new Uint8Array(N*3);
    order.forEach((netIdx,palIdx)=>{
      palette[palIdx*3+0]=net[netIdx][2]|0; // R
      palette[palIdx*3+1]=net[netIdx][1]|0; // G
      palette[palIdx*3+2]=net[netIdx][0]|0; // B
    });
    // map(r,g,b) -> nearest palette index
    function map(r,g,b){let best=0,bestd=1e9;for(let i=0;i<N;i++){const dr=palette[i*3]-r,dg=palette[i*3+1]-g,db=palette[i*3+2]-b,d=dr*dr+dg*dg+db*db;if(d<bestd){bestd=d;best=i;}}return best;}
    return{palette,map};
  }

  // GIF LZW encoder — correct implementation using sequence-keyed table
  function lzwEncode(indices,minCS){
    const clear=1<<minCS,eoi=clear+1;
    let codeSize=minCS+1,maxCode=1<<codeSize;
    const out=[];let buf=0,bufBits=0;
    function emit(code){buf|=code<<bufBits;bufBits+=codeSize;while(bufBits>=8){out.push(buf&0xff);buf>>>=8;bufBits-=8;}}
    // Table maps sequence string -> code.  Single pixels map "p" -> p.
    let table={};
    let nextCode=eoi+1;
    function reset(){
      table={};
      for(let i=0;i<clear;i++)table[String(i)]=i;
      emit(clear);
      codeSize=minCS+1;maxCode=1<<codeSize;nextCode=eoi+1;
    }
    reset();
    let seq=String(indices[0]);
    for(let i=1;i<indices.length;i++){
      const c=indices[i];
      const ext=seq+','+c;
      if(table[ext]!==undefined){
        seq=ext;
      } else {
        emit(table[seq]);
        if(nextCode<4096){
          table[ext]=nextCode++;
          if(nextCode>maxCode&&codeSize<12){codeSize++;maxCode<<=1;}
        } else {
          // Table full: emit clear and reset
          emit(clear);
          table={};for(let j=0;j<clear;j++)table[String(j)]=j;
          nextCode=eoi+1;codeSize=minCS+1;maxCode=1<<codeSize;
        }
        seq=String(c);
      }
    }
    emit(table[seq]);emit(eoi);
    if(bufBits>0)out.push(buf&0xff);
    return out;
  }

  function writeSubBlocks(arr,bytes){
    for(let i=0;i<bytes.length;){const n=Math.min(255,bytes.length-i);arr.push(n);for(let j=0;j<n;j++)arr.push(bytes[i++]);}
    arr.push(0);
  }

  // Encode frames: [{pixels:Uint8ClampedArray(w*h*4), delay:ms}]
  function encode(frames,w,h,useTransparency){
    const out=[];
    const u16=v=>{out.push(v&0xff,(v>>8)&0xff);};
    const str=s=>{for(let i=0;i<s.length;i++)out.push(s.charCodeAt(i)&0xff);};

    // Build palette from a merged sample of several frames for colour accuracy
    const sampleFrames=[frames[0],frames[Math.floor(frames.length/3)],frames[Math.floor(frames.length*2/3)],frames[frames.length-1]];
    const merged=new Uint8Array(sampleFrames.reduce((s,f)=>s+f.pixels.length,0));
    let moff=0;sampleFrames.forEach(f=>{merged.set(f.pixels,moff);moff+=f.pixels.length;});
    const nq=NeuQuant(merged,10);
    const pal=nq.palette;

    // GIF89a header
    str('GIF89a');u16(w);u16(h);
    out.push(0xf7,0,0); // packed: GCT present, 8bpp; bg index 0; pixel aspect 0
    // If transparent, overwrite palette entry 0 with pure black (the transparent colour)
    if(useTransparency){pal[0]=0;pal[1]=0;pal[2]=0;}
    for(let i=0;i<768;i++)out.push(pal[i]);

    // Netscape looping extension (loops forever)
    out.push(0x21,0xff,0x0b);str('NETSCAPE2.0');out.push(0x03,0x01,0x00,0x00,0x00);

    for(const frame of frames){
      const delay=Math.max(5,Math.round(frame.delay/10)); // centiseconds, min 2
      // Graphic control extension
      // Byte 4: flags — bit0=transpFlag, bits3-4=disposal(2=restore to bg)
      const gceFlags=useTransparency?0x09:0x00; // 0x09 = disposal:2 + transparent flag
      const transpIdx=useTransparency?0:0;
      out.push(0x21,0xf9,0x04,gceFlags);u16(delay);out.push(transpIdx,0);
      // Image descriptor
      out.push(0x2c);u16(0);u16(0);u16(w);u16(h);out.push(0);
      // Quantise pixels to palette indices
      const px=frame.pixels,idx=new Uint8Array(w*h);
      const ALPHA_THRESHOLD=30; // pixels below this alpha become transparent
      for(let i=0;i<w*h;i++){
        const j=i*4;
        if(useTransparency&&px[j+3]<ALPHA_THRESHOLD){
          idx[i]=0; // map to transparent palette entry
        } else {
          // Avoid accidentally mapping to index 0 (reserved for transparency)
          const mapped=nq.map(px[j],px[j+1],px[j+2]);
          idx[i]=useTransparency?(mapped===0?1:mapped):mapped;
        }
      }
      // LZW compress and write
      out.push(8);writeSubBlocks(out,lzwEncode(idx,8));
    }
    out.push(0x3b); // GIF trailer
    return new Uint8Array(out);
  }

  return{encode};
})();

// ── MP4 export via MediaRecorder ──
function exportMP4(){
  const wasAnim=S.anim;
  const statusEl=getStatusEl();
  const FPS=30;
  const FRAMES=Math.min(3600,getLoopFrameCount(FPS));
  const SZ=getQualitySize();
  const off=document.createElement('canvas');off.width=off.height=SZ;
  const oc=off.getContext('2d');
  const stream=off.captureStream(FPS);
  const mime=MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')?'video/mp4;codecs=avc1':
              MediaRecorder.isTypeSupported('video/webm;codecs=vp9')?'video/webm;codecs=vp9':'video/webm';
  const ext=mime.startsWith('video/mp4')?'mp4':'webm';
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:6000000});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  rec.onstop=()=>{
    const blob=new Blob(chunks,{type:mime});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.download='magic_circle.'+ext;a.href=url;a.click();
    setTimeout(()=>URL.revokeObjectURL(url),3000);
    statusEl.textContent='Saved! (.'+ext+')';setTimeout(()=>statusEl.textContent='',4000);
    if(wasAnim){S.anim=true;const _ab3=getAnimBtn();if(_ab3)_ab3.textContent='⏹';;const _ab4=getAnimBtn();if(_ab4)_ab4.classList.add('on');;animate();}
  };
  if(wasAnim){stopAnim();S.anim=false;}
  rec.start();
  let frame=0;
  // Match live speed: live runs at ~60fps with animT+=S.speed*0.001 per tick
  // Each export frame represents 1/FPS sec; at 60fps that's 60/FPS live ticks
  // So angle advances S.speed*0.001*(60/FPS) per export frame — same visual rate
  const angleStep=S.speed*0.001*(60/FPS);
  let captureAngle=animT; // start from current live position for continuity
  function renderFrame(){
    if(frame>=FRAMES){rec.stop();return;}
    draw(captureAngle);
    oc.clearRect(0,0,SZ,SZ);oc.drawImage(CV,0,0,SZ,SZ);
    captureAngle+=angleStep;
    frame++;
    statusEl.textContent='Video '+frame+'/'+FRAMES;
    // Use requestAnimationFrame to avoid overwhelming the browser but keep pace
    setTimeout(renderFrame,16);
  }
  renderFrame();
}

// ── Full loop calculation ──
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function lcmInt(a,b){return Math.round(a/gcd(Math.round(a),Math.round(b))*b);}
function lcmFracs(fracs){
  // fracs = [[num,den],...] representing period lengths
  let ln=fracs[0][0],ld=fracs[0][1];
  for(let i=1;i<fracs.length;i++){
    const n=fracs[i][0],d=fracs[i][1];
    // lcm(ln/ld, n/d) = lcm(ln*d, n*ld) / (ld*d)
    const newN=lcmInt(ln*d, n*ld);
    const newD=ld*d;
    const g=gcd(newN,newD);
    ln=newN/g; ld=newD/g;
  }
  return ln/ld;
}
function getFullLoopAnimT(){
  const syncEl2=document.getElementById('mLoopSync');const sync=syncEl2?syncEl2.value:'circle';
  // Periods as [num, den] fractions of 2π
  // period = 1/rate, rate = how many times faster than extraRot
  const P={
    circle:  [1,1],    // rate 1     → period 1
    dual:    [5,6],    // rate 6/5   → period 5/6
    text1:   [10,3],   // rate 3/10  → period 10/3
    text2:   [5,2],    // rate 2/5   → period 5/2
    sigil:   [5,1],    // rate 1/5   → period 5
  };
  // Build periods from actual S.speeds values
  function periodFrac(speedArr){
    // period = 1/rate = den/num (if num=0, element is still, period=∞, ignore it)
    if(speedArr[0]===0)return null;
    return [speedArr[1],speedArr[0]]; // [den,num]
  }
  const allPeriods={
    circle:  periodFrac(S.speeds.circle),
    dual:    periodFrac(S.speeds.dual),
    text1:   periodFrac(S.speeds.text1),
    text2:   periodFrac(S.speeds.text2),
    symbols: periodFrac(S.speeds.symbols),
    sigil:   periodFrac(S.speeds.sigil),
  };
  const groups={
    'circle':       ['circle'],
    'circle_dual':  ['circle','dual'],
    'circle_text':  ['circle','text1','text2'],
    'circle_sigil': ['circle','sigil'],
    'all':          ['circle','dual','text1','text2','sigil'],
  };
  const keys=groups[sync]||['circle'];
  const fracs=keys.map(k=>allPeriods[k]).filter(Boolean);
  if(fracs.length===0)return Math.PI*2; // fallback
  const loopPeriod=lcmFracs(fracs); // in multiples of 2π
  return loopPeriod*Math.PI*2; // total animT for one full loop
}
function getLoopFrameCount(fps){
  const animTTotal=getFullLoopAnimT();
  const advPerFrame=S.speed*0.001*(60/fps);
  return Math.max(12,Math.round(animTTotal/advPerFrame));
}

let mGifWorking=false;
function mExportGIF(){
  if(mGifWorking)return;mGifWorking=true;
  const st=document.getElementById('mStatus');
  const wasAnim=S.anim;
  if(wasAnim){stopAnim();S.anim=false;document.getElementById('mAnimBtn').textContent='▶';document.getElementById('mAnimBtn').classList.remove('on');}
  const gifMode=S.gifTranspMode||'none';
  const savedTranspBg=S.transparentBg,savedBg=S.bg;
  if(gifMode==='matte'){S.transparentBg=false;S.bg='#080808';}
  else if(gifMode==='threshold'){S.transparentBg=true;}
  else{S.transparentBg=false;}
  const useTransp=gifMode==='threshold';
  const GIF_FPS=15;
  const FRAMES=Math.min(500,getLoopFrameCount(GIF_FPS));
  const FPS=GIF_FPS,DELAY=Math.round(1000/FPS),SZ=mGetQSz();
  const off=document.createElement('canvas');off.width=off.height=SZ;
  const oc=off.getContext('2d',{willReadFrequently:true});
  const frames=[];let frame=0;
  function cap(){
    if(frame>=FRAMES){
      S.transparentBg=savedTranspBg;S.bg=savedBg;
      st.textContent='Encoding…';
      setTimeout(()=>{
        try{const gif=GIFEncoder.encode(frames,SZ,SZ,useTransp);const blob=new Blob([gif],{type:'image/gif'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download='magic_circle.gif';a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);st.textContent='Saved!';setTimeout(()=>st.textContent='',3000);}
        catch(e){st.textContent='Error: '+e.message;S.transparentBg=savedTranspBg;S.bg=savedBg;}
        mGifWorking=false;
        if(wasAnim){S.anim=true;document.getElementById('mAnimBtn').textContent='⏹';document.getElementById('mAnimBtn').classList.add('on');animate();}
      },50);return;
    }
    const angle=animT+(frame*(S.speed*0.001*(60/FPS)));
    draw(angle);oc.clearRect(0,0,SZ,SZ);oc.drawImage(CV,0,0,SZ,SZ);
    frames.push({pixels:oc.getImageData(0,0,SZ,SZ).data,delay:DELAY});
    frame++;st.textContent='Frame '+frame+'/'+FRAMES;setTimeout(cap,0);
  }
  st.textContent='Loop: '+FRAMES+'f @ '+FPS+'fps…';setTimeout(cap,10);
}
function mExportMP4(){
  const st=document.getElementById('mStatus');

  const mime=MediaRecorder.isTypeSupported('video/mp4;codecs=avc1')?'video/mp4;codecs=avc1':'video/webm;codecs=vp9';
  const ext=mime.startsWith('video/mp4')?'mp4':'webm';
  const rec=new MediaRecorder(stream,{mimeType:mime,videoBitsPerSecond:6000000});
  const chunks=[];
  rec.ondataavailable=e=>{if(e.data.size>0)chunks.push(e.data);};
  rec.onstop=()=>{const blob=new Blob(chunks,{type:mime});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.download='magic_circle.'+ext;a.href=url;a.click();setTimeout(()=>URL.revokeObjectURL(url),3000);st.textContent='Saved (.'+ext+')';setTimeout(()=>st.textContent='',4000);if(wasAnim){S.anim=true;document.getElementById('mAnimBtn').textContent='⏹';document.getElementById('mAnimBtn').classList.add('on');animate();}};
  if(wasAnim){stopAnim();S.anim=false;}

  rf();
}

function findRatioIndex(arr){
  // find closest match in SPEED_RATIOS
  const dec=arr[1]===0?0:arr[0]/arr[1];
  let best=8,bestDiff=999; // default to ×1
  SPEED_RATIOS.forEach(([n,d,],i)=>{const v=d===0?0:n/d;const diff=Math.abs(v-dec);if(diff<bestDiff){bestDiff=diff;best=i;}});
  return best;
}

function buildSpeedSelects(){
  const keys=['circle','dual','text1','text2','symbols','sigil'];
  const ids=['srCircle','srDual','srText1','srText2','srSymbols','srSigil'];
  keys.forEach((key,ki)=>{
    const sel=document.getElementById(ids[ki]);
    if(!sel)return;
    sel.innerHTML='';
    SPEED_RATIOS.forEach(([n,d,label],i)=>{
      const opt=document.createElement('option');
      opt.value=i;opt.textContent=label;
      sel.appendChild(opt);
    });
    sel.value=findRatioIndex(S.speeds[key]);
    sel.addEventListener('change',()=>{
      S.speeds[key]=SPEED_RATIOS[+sel.value];
      updateLoopInfo();
      if(!S.anim)render();
    });
  });
  updateLoopInfo();
}

function updateLoopInfo(){
  const syncEl=document.getElementById('mLoopSync');
  const infoEl=document.getElementById('mLoopInfoBox');
  if(!syncEl||!infoEl)return;
  try{
    const animT=getFullLoopAnimT();
    const f15=Math.min(9999,Math.round(animT/(S.speed*0.001*(60/15))));
    const s15=Math.round(f15/15*10)/10;
    const f30=Math.min(9999,Math.round(animT/(S.speed*0.001*(60/30))));
    const s30=Math.round(f30/30*10)/10;
    infoEl.innerHTML=
      '<b style="color:#aaa">GIF:</b> '+f15+'f @ 15fps = '+s15+'s<br>'+
      '<b style="color:#aaa">MP4:</b> '+f30+'f @ 30fps = '+s30+'s';
  }catch(e){
    if(infoEl)infoEl.textContent='Loop: error';
  }
}

function applyGolden(name){
  const preset=GOLDEN_PRESETS[name];
  if(!preset)return;
  Object.assign(S.speeds,preset);
  // Update all selects
  const keys=['circle','dual','text1','text2','symbols','sigil'];
  const ids=['srCircle','srDual','srText1','srText2','srSymbols','srSigil'];
  keys.forEach((key,ki)=>{
    const sel=document.getElementById(ids[ki]);
    if(sel)sel.value=findRatioIndex(S.speeds[key]);
  });
  updateLoopInfo();
  if(!S.anim)render();
}

// ── Navigation ──
let currentPanel = 'adjust';
const drawer = document.getElementById('drawer');
const drawerContent = document.getElementById('drawerContent');

function openPanel(name) {
  const wasOpen = drawer.classList.contains('open') && currentPanel === name;
  if (wasOpen) {
    drawer.classList.remove('open');
    document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
    return;
  }
  currentPanel = name;
  drawerContent.innerHTML = '';
  drawerContent.appendChild(buildPanel(name));
  drawer.classList.add('open');
  document.querySelectorAll('.navbtn').forEach(b => b.classList.toggle('active', b.dataset.panel === name));
  wirePanel(name);
}

document.getElementById('drawerHandle').addEventListener('click', () => {
  drawer.classList.toggle('open');
});

document.querySelectorAll('.navbtn').forEach(btn => {
  btn.addEventListener('click', () => openPanel(btn.dataset.panel));
});

// ── Wire panel controls ──
function wirePanel(name) {
  function sl(id, setter, valId, fmt) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', () => { const v = +el.value; setter(v); if (valId) document.getElementById(valId).textContent = fmt ? fmt(v) : v; if (!S.anim) render(); });
  }
  function ck(id, setter) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('change', e => { setter(e.target.checked); if (!S.anim) render(); });
  }
  function sel(id, setter) {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('change', e => { setter(e.target.value); if (!S.anim) render(); });
  }

  if (name === 'adjust') {
    sl('mPts', v=>S.pts=v, 'mvPts');
    sl('mRings', v=>S.rings=v, 'mvRings');
    sl('mDetail', v=>S.detail=v, 'mvDetail');
    sl('mCenterPat', v=>S.detail2.centerPat=v, 'mvCenterPat');
    sl('mScale', v=>S.scale=v, 'mvScale');
    sl('mLW', v=>S.lw=v/10, 'mvLW', v=>(v/10).toFixed(1));
    sl('mGlow', v=>S.glow=v, 'mvGlow');
    sl('mOpacity', v=>S.opacity=v/100, 'mvOpacity', v=>v+'%');
    sl('mRot', v=>S.rotate=v, 'mvRot', v=>v+'°');
    sl('mSpeed', v=>S.speed=v, 'mvSpeed');
    [['mlOuter','outer'],['mlInner','inner'],['mlGeom','geom'],['mlNodes','nodes'],
     ['mlSpokes','spokes'],['mlTicks','ticks'],['mlCenter','center'],['mlTextRings','textRings']
    ].forEach(([id,key]) => ck(id, v=>S.layers[key]=v));
  }

  else if (name === 'color') {
    buildCSwatch('mSwColor', COLS, (k,hex)=>{S.color=hex;S.glow2=GLOWS[k];if(!S.anim)render();});
    buildCSwatch('mSwBg', BGS, (k,hex)=>{S.bg=hex;document.getElementById('mCustomBg').value=hex;if(!S.anim)render();});
    buildCSwatch('mSwColor2', COLS, (k,hex)=>{S.color2=hex;if(!S.anim)render();});
    document.getElementById('mSwColor').querySelector('.csw')?.classList.add('sel');
    document.getElementById('mSwBg').querySelector('.csw')?.classList.add('sel');
    document.getElementById('mCustomColor').addEventListener('input',e=>{S.color=e.target.value;S.glow2=e.target.value+'88';document.querySelectorAll('#mSwColor .csw').forEach(x=>x.classList.remove('sel'));if(!S.anim)render();});
    document.getElementById('mCustomBg').addEventListener('input',e=>{S.bg=e.target.value;document.querySelectorAll('#mSwBg .csw').forEach(x=>x.classList.remove('sel'));if(!S.anim)render();});
    ck('mTranspBg', v=>{S.transparentBg=v;if(!S.anim)render();});
  }

  else if (name === 'detail') {
    sel('mdNodeStyle', v=>{S.detail2.nodeStyle=v;});
    ck('mdNodeFill', v=>S.detail2.nodeFill=v);
    ck('mdNodeRings', v=>S.detail2.nodeRings=v);
    sl('mdNodeSz', v=>S.detail2.nodeSz=v, 'mvNodeSz');
    sl('mdNodeMul', v=>S.detail2.nodeMul=v, 'mvNodeMul', v=>'×'+v);
    sl('mdNodeOffset', v=>S.detail2.nodeOffset=v, 'mvNodeOffset', v=>v+'°');
    sl('mdNodeOpacity', v=>S.detail2.nodeOpacity=v/100, 'mvNodeOpacity', v=>v+'%');
    sel('mdSpokeStyle', v=>S.detail2.spokeStyle=v);
    sl('mdSpokeSkip', v=>S.detail2.spokeSkip=v, 'mvSpokeSkip');
    sl('mdSpokeMul', v=>S.detail2.spokeMul=v, 'mvSpokeMul', v=>'×'+v);
    sl('mdSpokeInner', v=>S.detail2.spokeInner=v, 'mvSpokeInner', v=>v+'%');
    sl('mdSpokeOuter', v=>S.detail2.spokeOuter=v, 'mvSpokeOuter', v=>v+'%');
    sl('mdSpokeOffset', v=>S.detail2.spokeOffset=v, 'mvSpokeOffset', v=>v+'°');
    ck('mdCross', v=>S.detail2.cross=v);
    ck('mdDouble', v=>S.detail2.double=v);
    ck('mdDash', v=>S.detail2.dash=v);
    sl('mdTickMul', v=>S.detail2.tickMul=v, 'mvTickMul', v=>'×'+v);
  }

  else if (name === 'sigil') {
    ck('mSigilActive', v=>{S.sigil.active=v;});
    ck('mSigilSync', v=>{S.sigil.syncPts=v;if(v&&S.sigil.letters.length>=3)mGenerateSigil();});
    sel('mSigilRed', v=>{S.sigil.reduction=v;mGenerateSigil();});
    sel('mSigilGrid', v=>S.sigil.grid=v);
    sel('mSigilLine', v=>S.sigil.lineStyle=v);
    sel('mSigilTerm', v=>S.sigil.terminal=v);
    sel('mSigilBlend', v=>S.sigil.blendMode=v);
    sl('mSigilSym', v=>S.sigil.symmetry=v, 'mvSigilSym');
    sl('mSigilOffR', v=>S.sigil.offsetR=v/100, 'mvSigilOffR', v=>(v/100).toFixed(2));
    sl('mSigilScale', v=>S.sigil.scale=v, 'mvSigilScale', v=>v+'%');
    sl('mSigilRot', v=>S.sigil.rotate=v, 'mvSigilRot', v=>v+'°');
    sl('mSigilOp', v=>S.sigil.opacity=v/100, 'mvSigilOp', v=>v+'%');
    sl('mSigilWt', v=>S.sigil.weight=v/100, 'mvSigilWt', v=>(v/100).toFixed(1)+'×');
    sl('mSigilSm', v=>S.sigil.smooth=v/100, 'mvSigilSm', v=>v+'%');
    sl('mSigilSeed', v=>S.sigil.seed=v, 'mvSigilSeed');
    document.getElementById('mSigilIntent').addEventListener('keydown',e=>{if(e.key==='Enter')mGenerateSigil();});
    // Symbol picker
    mBuildSymGrid('alchemic');
    document.getElementById('mSymSet').addEventListener('change',e=>mBuildSymGrid(e.target.value));
    sl('mSymSize', v=>S.symSize=v, 'mvSymSize');
    sl('mSymR', v=>S.symR=v, 'mvSymR', v=>v+'%');
  }

  else if (name === 'text') {
    document.getElementById('mtr1').addEventListener('input',e=>{S.tr[0].text=e.target.value;if(!S.anim)render();});
    document.getElementById('mtr2').addEventListener('input',e=>{S.tr[1].text=e.target.value;if(!S.anim)render();});
    document.getElementById('mtr3').addEventListener('input',e=>{S.tr[2].text=e.target.value;if(!S.anim)render();});
    sl('mtr1R',v=>S.tr[0].r=v,'mvtr1R'); sl('mtr1S',v=>S.tr[0].s=v,'mvtr1S'); sl('mtr1Sp',v=>S.tr[0].sp=v,'mvtr1Sp');
    sl('mtr2R',v=>S.tr[1].r=v,'mvtr2R'); sl('mtr2S',v=>S.tr[1].s=v,'mvtr2S'); sl('mtr2Sp',v=>S.tr[1].sp=v,'mvtr2Sp');
    sl('mtr3S',v=>S.tr[2].s=v,'mvtr3S');
    ck('mtr1Flip',v=>S.tr[0].flip=v); ck('mtr2Flip',v=>S.tr[1].flip=v);
  }

  else if (name === 'speeds') {
    buildSpeedSelects();
    // mLoopSync lives in the export panel — update loop info when it changes if open
    const ls=document.getElementById('mLoopSync');
    if(ls)ls.addEventListener('change',()=>updateLoopInfo());
  }

  else if (name === 'export') {
    document.getElementById('mGifTransp').addEventListener('change',e=>S.gifTranspMode=e.target.value);
    const ls2=document.getElementById('mLoopSync');
    if(ls2)ls2.addEventListener('change',()=>updateLoopInfo());
    // Presets (using global PRESETS)
    const mpl=document.getElementById('mPresetList');
    PRESETS.forEach(p=>{const b=document.createElement('button');b.className='pbtn';b.textContent=p.name;b.addEventListener('click',()=>mApplyPreset(p));mpl.appendChild(b);});
    renderUserPresets();
  }
}

// ── Helpers ──
function buildCSwatch(containerId,colMap,onClick){
  const c=document.getElementById(containerId);
  if(!c||c.children.length)return;
  Object.entries(colMap).forEach(([k,hex])=>{
    const s=document.createElement('div');s.className='csw';s.style.background=hex;s.dataset.ck=k;s.title=k;
    s.addEventListener('click',()=>{c.querySelectorAll('.csw').forEach(x=>x.classList.remove('sel'));s.classList.add('sel');onClick(k,hex);});
    c.appendChild(s);
  });
}

let mSelSyms=[];
function mBuildSymGrid(setKey){
  const g=document.getElementById('mSymGrid');if(!g)return;g.innerHTML='';
  (SYM_SETS[setKey]||[]).forEach(s=>{
    const d=document.createElement('div');d.className='msym';d.textContent=s;
    d.addEventListener('click',()=>{if(mSelSyms.includes(s)){mSelSyms=mSelSyms.filter(x=>x!==s);d.classList.remove('sel');}else{mSelSyms.push(s);d.classList.add('sel');}const el=document.getElementById('mSelSyms');if(el)el.textContent=mSelSyms.join('');});
    g.appendChild(d);
  });
}
function mClearSyms(){mSelSyms=[];const g=document.getElementById('mSelSyms');if(g)g.textContent='';document.querySelectorAll('.msym').forEach(x=>x.classList.remove('sel'));}
function mApplySyms(){S.symbols=[...mSelSyms];if(!S.anim)render();}

function mGenerateSigil(){
  const intent=document.getElementById('mSigilIntent')?.value.trim();
  if(!intent){S.sigil.letters=[];if(!S.anim)render();return;}
  S.sigil.intention=intent;
  S.sigil.letters=sigilProcessLetters(intent,S.sigil.reduction);
  const el=document.getElementById('mSigilLetters');
  if(el)el.textContent=S.sigil.letters.length?'Letters: '+S.sigil.letters.join(' · '):'(none)';
  if(S.sigil.syncPts&&S.sigil.letters.length>=3){S.pts=Math.min(16,Math.max(3,S.sigil.letters.length));}
  if(!S.anim)render();
}

function mApplyPreset(p){
  const ck=p.color;
  Object.assign(S,{style:p.style,pts:p.pts,rings:p.rings,detail:p.detail,color:COLS[ck]||COLS.gold,glow2:GLOWS[ck]||GLOWS.gold,bg:p.bg,dual:!!p.dual});
  if(p.tr0!==undefined)S.tr[0].text=p.tr0;if(p.tr1!==undefined)S.tr[1].text=p.tr1;if(p.tr2!==undefined)S.tr[2].text=p.tr2;
  document.getElementById('styleSelect').value=S.style;
  if(!S.anim)render();
}

let mUserPresets=[];
function mSavePreset(){
  const name=document.getElementById('mPresetName')?.value.trim();if(!name)return;
  const snap=JSON.parse(JSON.stringify(S));snap.name=name;mUserPresets.push(snap);renderUserPresets();
  const el=document.getElementById('mPresetName');if(el)el.value='';
}
function renderUserPresets(){
  const c=document.getElementById('mUserPresets');if(!c)return;c.innerHTML='';
  mUserPresets.forEach(p=>{const b=document.createElement('button');b.className='pbtn';b.textContent=p.name;b.addEventListener('click',()=>{Object.assign(S,JSON.parse(JSON.stringify(p)));if(!S.anim)render();});c.appendChild(b);});
}

document.getElementById('mRandBtn').addEventListener('click',()=>{
  const styles=['star','orbital','alchemic','pentagram','mandala','celtic','sigil','rose','enochian','sacred','compass','labyrinth','zodiac','fractal','gothic','norse','chaos'];
  const colKeys=Object.keys(COLS);
  S.style=styles[Math.floor(Math.random()*styles.length)];
  S.pts=3+Math.floor(Math.random()*14);S.rings=1+Math.floor(Math.random()*7);S.detail=1+Math.floor(Math.random()*5);
  const ck=colKeys[Math.floor(Math.random()*colKeys.length)];S.color=COLS[ck];S.glow2=GLOWS[ck];
  document.getElementById('styleSelect').value=S.style;
  if(!S.anim)render();
});

// FABs
document.getElementById('fabPulse').addEventListener('click',()=>{S.pulse=!S.pulse;document.getElementById('fabPulse').classList.toggle('on',S.pulse);if(S.pulse&&!S.anim){S.anim=true;document.getElementById('mAnimBtn').textContent='⏹';document.getElementById('mAnimBtn').classList.add('on');animate();}else if(!S.anim)render();});
document.getElementById('fabDual').addEventListener('click',()=>{S.dual=!S.dual;document.getElementById('fabDual').classList.toggle('on',S.dual);if(!S.anim)render();});
document.getElementById('fabMirror').addEventListener('click',()=>{S.mirror=!S.mirror;document.getElementById('fabMirror').classList.toggle('on',S.mirror);if(!S.anim)render();});
document.getElementById('fabSparks').addEventListener('click',()=>{S.sparks=!S.sparks;document.getElementById('fabSparks').classList.toggle('on',S.sparks);if(S.sparks&&!S.anim){S.anim=true;document.getElementById('mAnimBtn').textContent='⏹';document.getElementById('mAnimBtn').classList.add('on');animate();}if(!S.sparks)sparks=[];});

// ── Init ──
resize();
render();
</script>
